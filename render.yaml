services:
  - type: web
    name: cup-budd-api
    env: docker
    repo: https://github.com/sayan-does/cup-budd
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: APP_ENV
        value: production
      - key: API_BASE_URL
        value: https://cup-budd-api.onrender.com
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ZAFRONIX_API_KEY
        sync: false
      - key: ZAFRONIX_API_BASE_URL
        value: https://api.zafronix.com/fifa/worldcup/v1
      - key: ZAFRONIX_TOURNAMENT_YEAR
        value: "2026"
      - key: POLL_INTERVAL_LIVE_SEC
        value: "30"
      - key: POLL_INTERVAL_IDLE_SEC
        value: "300"
      - key: FIXTURE_SYNC_INTERVAL_HOURS
        value: "6"
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_CLAIMS_EMAIL
        value: mailto:admin@example.com
